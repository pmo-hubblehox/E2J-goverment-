server:
  port: 8081
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB
  datasource:
    url: jdbc:postgresql://localhost:5433/e2j_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:hubblehox.pmo@gmail.com}
    password: ${MAIL_PASSWORD:Matrix@123}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

youtube:
  api:
    key: ${YOUTUBE_API_KEY:AIzaSyB0NjLNGo7iLW32RD6JgARLcghgFu1Moao}
    max-results: 12
    cache-ttl-minutes: 60

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  jwt:
    secret: ${JWT_SECRET:hubblehox-e2j-secret-key-2025-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000   # 24 hours
  otp:
    expiry-minutes: 10
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:3000

skill-gap:
  api-url: ${SKILL_GAP_API_URL:http://localhost:8000}

groq:
  api:
    key: ${GROQ_API_KEY}

elevenlabs:
  api:
    key: ${ELEVENLABS_API_KEY:sk_639070cbbf746a5b15730983bd0edad6e8a5de8ef8c7be54}
  voices:
    english: dveobG1rlBV3LOoiDZTD
    hindi: d0grukerEzs069eKIauC

logging:
  level:
    com.hubblehox.e2j: DEBUG
    org.springframework.security: INFO
